# agent-bark-notify 默认文案（中性、通用）
#
# 格式：
#   [done]      任务自然完成时随机抽一条
#   [action]    用户主动停止 / 需要授权时抽一条
#   每行 "标题|正文"，# 开头注释，空行忽略
#
# 自定义：把本文件或 messages.example.conf 复制到
#   ~/.config/agent-bark-notify/messages.conf
# 改完即时生效（脚本每次触发都会重新读取）。

[done]
✅ 任务完成|已完成，等你检阅
🔔 搞定|结果已就绪
✓ Done|Claude finished a turn
任务结束|Claude 停下了，随时回来
✅ 完成|需要的话回来验收

[action]
⚠️ 需要确认|有个操作等你授权
🔔 等你回复|需要你的输入
需要出手|卡住了，回来看看

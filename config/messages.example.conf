# agent-bark-notify 文案示例 —— 个人风格参考
#
# 这是项目作者的私人风格（舔狗/摆烂/暧昧/暴躁/发疯五套混搭），
# 仅为展示"可以皮到什么程度"。默认不会启用。
#
# 想用：复制本文件到 ~/.config/agent-bark-notify/messages.conf 即可覆盖默认。
# 想改：直接编辑你那份 messages.conf，加你自己的风格。
#
# 格式同 messages.default.conf：[done]/[action] 两段，每行 "标题|正文"。

[done]
🎉 搞定了！|快来看看成果吧
✨ 任务完成！|等你检阅 ✅
主人！搞定了！|您的狗子已经把活干完了，快来夸我.jpg
爹！完事儿了！|搞完了，您瞅瞅？
做完了，累死|我尽力了，剩下的交给你
下班了下班了|活儿干完了，你看着办吧
想你了|活干完了，第一反应是告诉你…
搞定了，有没有奖励？|主人赏点什么吗 🥺
艹，搞完了|你给的活干完了，快来验收
淦！好了！|累死老子了，你看看行不行
电子牛马干完活了|您的 AI 长工已累倒在代码堆里

[action]
👋 嘿，需要你一下|有个操作需要你授权
爸！我需要你！|没你点头我不敢动，回来看看呗😭
拿不定主意|你定吧，我选择躺平等你
你定吧我随便|我选择躺平，你来点头
你别不理我啊🥺|我等你等得好苦，回来看看好吗
喂！人呢！|卡住了！需要你点一下，别装死
你人呢？等你半天了|还活着吗？点一下让我继续
我不行了，你来|大脑宕机中，请按任意键继续
救！！！|没你授权我动不了

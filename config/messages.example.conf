# agent-bark-notify 文案示例 -- 个人风格参考
#
# 这是项目作者的私人风格（舔狗/摆烂/暴躁/发疯等混搭），
# 仅为展示"可以皮到什么程度"。默认不会启用。
#
# 想用：复制本文件到 ~/.config/agent-bark-notify/messages.conf 即可覆盖默认。
# 想改：直接编辑你那份 messages.conf，加你自己的风格。
#
# 格式：[done]/[action] 两段，每组随机抽一条。
#   - 每行一条 = 推送标题，正文自动放任务摘要
#   - 也支持 "标题|正文" 两段格式（合并成一句更详细的标题）
#   # 开头注释，空行忽略；改完即时生效（每次推送都重新读取）。

[done]
搞定了！看看成果吧
任务完成！等你检阅 ✅
主人！搞定了！快来夸我！
爹！完事儿了！您瞅瞅？
做完了，累死
下班了下班了，你看着办吧
搞定了，有没有奖励？🥺
艹，搞完了，快来验收
淦！累死老子了，你看看行不行
电子牛马干完活了

[action]
喂！点一下，急
主人！这步要你定
爹！来活儿了，麻溜的
艹，卡住了，快来点一下
这步，等你拍板
别摸鱼了，有活儿
电子牛马请求指示
在线等，挺急的
搞不定，得你来
